version: '3'
services:
  django:
    command: /usr/local/bin/python manage.py migrate
             /usr/local/bin/python manage.py collectstatic --noinput
             /usr/local/bin/gunicorn backend.asgi:application -w 1 -b :8000 -k uvicorn.workers.UvicornWorker
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        buildno: 1
    image: django
    container_name: django
    env_file: .env
    volumes:
      - ./server:/server
      - ./logs/gunicorn:/var/log/gunicorn
      - ./frontend/dist:/app/app/static/dist
    expose:
      - "8000"
    depends_on:
      - postgres
    ports:
      - "8443:8443"
    restart: always

  postgres:
    image: postgres:14-alpine
    container_name: postgres
    restart: always
    expose:
      - "5432"
    env_file: .env
    volumes:
      - ./pgdata:/var/lib/postgresql/data

  nginx:
    container_name: nginx
    restart: always
    build:
      context: ./nginx/
      dockerfile: Dockerfile
    image: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./logs/nginx:/var/log/nginx
      - ./nginx/conf:/etc/nginx/conf
      - ./nginx/sites-enabled:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
      - ./server:/app
    depends_on:
      - postgres
      - django
      - frontend

  frontend:
    command: npm run build
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        buildno: 1
    container_name: frontend_atm
    image: frontend_atm
    volumes:
      - ./frontend:/app
      - /app/node_modules